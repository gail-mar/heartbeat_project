<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Heartbeat from Video</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; text-align: center; }
    .result { font-size: 2rem; margin-top: 20px; }
    .error { color: #b00020; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>Heartbeat from Video</h1>
  <p>Upload a short video of a face (steady lighting, minimal movement works best).</p>

  <form method="post" enctype="multipart/form-data">
    <input type="file" name="video" accept="video/*" required><br><br>
    <label>Algorithm: </label>
    <select name="method">
      <option value="green_baseline">Baseline (green channel only)</option>
      <option value="chrom">CHROM</option>
      <option value="pos">POS</option>
    </select><br><br>
    <label>Actual BPM from another device (optional, for comparison): </label>
    <input type="number" step="0.1" name="reference_bpm"><br><br>
    <button type="submit">Analyze</button>
  </form>

  {% if bpm %}
    <div class="result">Estimated heart rate: {{ bpm }} BPM</div>
  {% endif %}

  {% if error %}
    <div class="error">{{ error }}</div>
  {% endif %}
</body>
</html>
